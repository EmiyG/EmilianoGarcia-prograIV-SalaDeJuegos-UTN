<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4 text-center">
                    Registro
                </h2>

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" class="form-control" [(ngModel)]="nombre">
                </div>

                <div class="mb-3">
                    <label>Apellido</label>
                    <input type="text" class="form-control" [(ngModel)]="apellido">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" [(ngModel)]="email">
                </div>

                <div class="mb-3">
                    <label>Edad</label>
                    <input type="number" class="form-control" [(ngModel)]="edad">
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" [(ngModel)]="password">
                </div>

                <button class="btn btn-success w-100" (click)="registrarse()">
                    Registrarse
                </button>

            </div>

        </div>

    </div>

</div>
