<div class="container mt-4">

  <h1 class="text-center mb-4">
    Chat Global
  </h1>

  <div class="border p-3 mb-3 chat-box">

    @for(mensaje of mensajes; track mensaje.id){

      <div class="chat-mensaje">

        <div class="chat-contenido">
          {{ mensaje.mensaje }}
        </div>

        <div class="chat-meta">
          <span class="chat-usuario">{{ mensaje.usuario }}</span>
          <span class="chat-fecha">{{ mensaje.fecha | date:'dd/MM/yy HH:mm' }}</span>
        </div>

      </div>

    }

  </div>

  <div class="d-flex">

    <input
      type="text"
      class="form-control me-2"
      [(ngModel)]="nuevoMensaje"
      (keydown.enter)="enviarMensaje()">

    <button
      class="btn btn-primary"
      (click)="enviarMensaje()">

      Enviar

    </button>

  </div>

</div>
