<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4 text-center">
                    Iniciar Sesión
                </h2>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email" class="form-control" [(ngModel)]="email">

                </div>

                <div class="mb-3">

                    <label>Contraseña</label>

                    <input type="password" class="form-control" [(ngModel)]="password">

                </div>

                <button class="btn btn-primary w-100" (click)="login()">
                    Ingresar
                </button>

                <hr>

                <h5 class="text-center mb-3">
                    Acceso rápido
                </h5>

                <div class="d-grid gap-2">

                    @for(usuario of usuariosRapidos; track usuario.email){

                    <button class="btn btn-secondary" (click)="accesoRapido(usuario)">

                        {{ usuario.email }}

                    </button>

                    }

                </div>

            </div>

        </div>

    </div>

</div>
