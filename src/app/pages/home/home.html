<div class="text-center mt-5">

  <h1 class="display-4 mb-4">
    Sala de Juegos
  </h1>

  @if(!usuario){

    <p class="lead">
      Debes iniciar sesión para acceder a los juegos.
    </p>

  } @else {

    <h3 class="mb-4">
      Bienvenido {{ usuario.email }}
    </h3>

    <div class="d-flex justify-content-center gap-3">

      <button
        class="btn btn-danger"
        (click)="logout()"
      >
        Cerrar sesión
      </button>

    </div>

  }

</div>
